<section class="card contact-card hidden">

  <div class="contact-left">

    <p><i class="fas fa-envelope"></i> kamaltadi112@email.com</p>

    <form id="contact-form">

  <input type="email" name="from_email" placeholder="Your Email" required class="input-field">
  <textarea name="message" placeholder="Your Message" required class="input-field"></textarea>

  <button type="submit" class="btn send-btn">Send Message</button>

  <p id="success-message" class="success-msg"></p>
</form>
